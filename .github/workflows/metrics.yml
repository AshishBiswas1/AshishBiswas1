name: Metrics
on:
  schedule: [{cron: "0 0 * * *"}]
  workflow_dispatch:
  push: {branches: ["master", "main"]}

jobs:
  github-metrics:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: lowlighter/metrics@latest
        with:
          token: ${{ secrets.METRICS_TOKEN }}
          user: AshishBiswas1

          # 🔹 Layout & Base (IMPORTANT for structure)
          template: classic
          base: header, activity, community, repositories, metadata
          config_timezone: Asia/Kolkata
          config_display: large
          config_padding: 12%

          # 🔹 GitHub Stats (Top section like first image)
          plugin_isocalendar: yes
          plugin_isocalendar_duration: full-year

          # 🔹 Languages (Already working but improved)
          plugin_languages: yes
          plugin_languages_ignored: html, css
          plugin_languages_details: bytes-size, percentage
          plugin_languages_limit: 6
          plugin_languages_sections: most-used

          # 🔹 Topics (Tech stack icons row)
          plugin_topics: yes
          plugin_topics_mode: icons
          plugin_topics_limit: 24
          plugin_topics_sort: stars

          # 🔹 Coding Habits (Time-of-day graph)
          plugin_habits: yes
          plugin_habits_from: 200
          plugin_habits_days: 14
          plugin_habits_facts: yes
          plugin_habits_charts: yes

          # 🔹 PageSpeed (Top right scores)
          plugin_pagespeed: yes
          plugin_pagespeed_url: https://github.com/AshishBiswas1
          plugin_pagespeed_detailed: yes

          # 🔹 Achievements / Contributions styling
          plugin_achievements: yes
          plugin_achievements_threshold: B
          plugin_achievements_display: detailed

          # 🔹 Activity & contributions (IMPORTANT difference)
          plugin_activity: yes
          plugin_activity_limit: 5
          plugin_activity_days: 14

          # 🔹 3D Contribution Calendar (THIS is missing in yours)
          plugin_skyline: yes
          plugin_skyline_year: current-year

          # 🔹 Follow-up improvements
          plugin_stars: yes
          plugin_stars_limit: 4

          # 🔹 Metadata tweaks
          commits_authoring: Ashish Biswas
