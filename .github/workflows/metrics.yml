name: Metrics
on:
  schedule: [{cron: "0 0 * * *"}] # Updates every day at midnight
  workflow_dispatch:
  push: {branches: ["master", "main"]}
jobs:
  github-metrics:
    runs-on: ubuntu-latest
    steps:
      - uses: lowlighter/metrics@latest
        with:
          token: ${{ secrets.METRICS_TOKEN }}
          user: AshishBiswas1
          template: classic
          base: header, activity, community, repositories, metadata
          config_timezone: Asia/Kolkata
          
          # This adds the "Most used languages" bar from your image
          plugin_languages: yes
          plugin_languages_ignored: html, css
          plugin_languages_details: bytes-size, percentage
          
          # This adds the tech icons (Mastered technologies)
          plugin_topics: yes
          plugin_topics_mode: icons
          plugin_topics_limit: 15
          
          # This adds the "Suggested tracks" feel (if you use Spotify/Last.fm)
          # Otherwise, it shows coding habits/activity time
          plugin_habits: yes
          plugin_habits_from: 200
          plugin_habits_days: 14
