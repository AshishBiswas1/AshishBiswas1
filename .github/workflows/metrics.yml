name: Metrics
on:
  schedule: [{cron: "0 0 * * *"}]
  workflow_dispatch:
  push: {branches: ["master", "main"]}
jobs:
  github-metrics:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: lowlighter/metrics@latest
        with:
          token: ${{ secrets.METRICS_TOKEN }}
          user: AshishBiswas1
          template: classic
          base: header, activity, community, repositories, metadata
          config_timezone: Asia/Kolkata
          
          # Most used languages (The colorful bar)
          plugin_languages: yes
          plugin_languages_ignored: html, css
          plugin_languages_details: bytes-size, percentage
          
          # Mastered technologies (The tech icons)
          plugin_topics: yes
          plugin_topics_mode: icons
          plugin_topics_limit: 20
          
          # Recent activity habits (Disabled temporarily to fix your TypeError)
          plugin_habits: no
          
          # Optional: PageSpeed (If you have a live portfolio URL, add it here)
          # plugin_pagespeed: yes
          # plugin_pagespeed_url: https://your-portfolio.com
