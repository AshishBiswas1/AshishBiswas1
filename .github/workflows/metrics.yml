name: Metrics
on:
  schedule: [{cron: "0 0 * * *"}]
  workflow_dispatch:
  push: {branches: ["master", "main"]}
jobs:
  github-metrics:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: lowlighter/metrics@latest
        with:
          token: ${{ secrets.METRICS_TOKEN }}
          user: AshishBiswas1
          template: classic
          base: header, activity, community, repositories, metadata
          config_timezone: Asia/Kolkata
          
          # 1. Most used languages (Already working for you)
          plugin_languages: yes
          plugin_languages_ignored: html, css
          plugin_languages_details: bytes-size, percentage
          
          # 2. Mastered technologies (The icons from the bottom of your reference image)
          plugin_topics: yes
          plugin_topics_mode: icons
          plugin_topics_limit: 20
          plugin_topics_sort: stars

          # 3. PageSpeed Insights (The 100/100 scores in the top right of your reference image)
          # Note: Replace with your live portfolio link if you have one!
          plugin_pagespeed: yes
          plugin_pagespeed_url: https://github.com/AshishBiswas1
          plugin_pagespeed_detailed: yes
          
          # 4. Coding habits (The "Commit activity per time of day" chart)
          plugin_habits: yes
          plugin_habits_from: 200
          plugin_habits_days: 14
          plugin_habits_facts: yes
          plugin_habits_charts: yes
